services:
  aemu-server:
    image: ghcr.io/a-blondel/aemu-servers/aemu-server:latest
    restart: unless-stopped
    networks:
      - aemu-net
    ports:
      - "27312:27312"
    volumes:
      - status-data:/data
      - ./custom/database.db:/app/database.db

  postoffice:
    image: ghcr.io/a-blondel/aemu-servers/postoffice:latest
    restart: unless-stopped
    networks:
      - aemu-net
    ports:
      - "27313:27313"
    # Uncomment to replace the default postoffice config:
    # volumes:
    #   - ./custom/config.json:/app/config.json

  web:
    image: ghcr.io/a-blondel/aemu-servers/web:latest
    restart: unless-stopped
    networks:
      - traefik-public
      - aemu-net
    labels:
      - "traefik.enable=true"
      # HTTP router (HTTPS redirection)
      - "traefik.http.routers.adhoc-http.rule=Host(`adhoc.eahub.eu`)"
      - "traefik.http.routers.adhoc-http.entrypoints=web"
      - "traefik.http.routers.adhoc-http.middlewares=adhoc-redirect"
      # Middleware for redirection
      - "traefik.http.middlewares.adhoc-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.adhoc-redirect.redirectscheme.permanent=true"
      # HTTPS router
      - "traefik.http.routers.adhoc-https.rule=Host(`adhoc.eahub.eu`)"
      - "traefik.http.routers.adhoc-https.entrypoints=websecure"
      - "traefik.http.routers.adhoc-https.tls=true"
      - "traefik.http.routers.adhoc-https.tls.certresolver=letsencrypt"
      # Service
      - "traefik.http.services.adhoc-service.loadbalancer.server.port=8080"
      - "traefik.docker.network=traefik-public"
    environment:
      - POSTOFFICE_URL=http://postoffice:27314
    volumes:
      - status-data:/data:ro
      - ./custom/status.html:/app/www/status.html:ro
      - ./custom/style.css:/app/www/style.css:ro
    depends_on:
      - aemu-server
      - postoffice

networks:
  traefik-public:
    external: true
  aemu-net:
    driver: bridge

volumes:
  status-data:
